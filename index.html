<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חידת השחף המצווח - המשחק</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        #chat-box { max-width: 600px; margin: 0 auto; background: #333; padding: 20px; border-radius: 10px; }
        #responses { height: 300px; overflow-y: auto; border-bottom: 1px solid #555; margin-bottom: 20px; text-align: right; padding: 10px; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 5px; }
        button:hover { background: #ff6b81; }
    </style>
</head>
<body>

    <h1>השחף המצווח</h1>
    <p>שאלו את ה-AI שאלות של כן/לא כדי לפתור את המסתורין...</p>

    <div id="chat-box">
        <div id="responses"></div>
        <input type="text" id="userQuestion" placeholder="שאלו שאלה של כן ולא בלבד" onkeypress="if(event.key==='Enter') askAI()">
        <button onclick="askAI()">שאל</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>


    <script> 
        async function askAI() {
            const inputElement = document.getElementById('userQuestion');
            const questionText = inputElement.value.trim();
            
            // בדיקה שהשאלה לא ריקה
            if (!questionText) return;

            const resDiv = document.getElementById('responses');
            
            // תיקון: השתמשתי ב-questionText במקום ב-question שלא היה מוגדר
            resDiv.innerHTML += `<div><b>אתה:</b> ${questionText}</div>`;
            inputElement.value = ''; // ניקוי התיבה

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: questionText // המפתח 'question' חייב להתאים למה שכתבת ב-api/chat.js
                    })
                });

                const data = await response.json();

                if (data.error) {
                    // הצגת שגיאה מהשרת אם יש כזו
                    resDiv.innerHTML += `<div style="color: #ff4757;"><b>שגיאה:</b> ${data.error}</div>`;
                } else {
                    // שליפת ה-answer כפי שהגדרת ב-Backend
                    const answer = data.answer;
                    resDiv.innerHTML += `<div><b>AI:</b> ${answer}</div>`;
                }
            } catch (e) {
                resDiv.innerHTML += `<div style="color: #ff4757;"><b>שגיאה:</b> חיבור לשרת נכשל. וודא שהעלית את התיקייה api ל-Vercel.</div>`;
            } 

            // גלילה אוטומטית למטה
            resDiv.scrollTop = resDiv.scrollHeight;
        }
    </script>
</body>
</html>
