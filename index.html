<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חידת השחף המצווח - המשחק</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        #chat-box { max-width: 600px; margin: 0 auto; background: #333; padding: 20px; border-radius: 10px; }
        #responses { height: 300px; overflow-y: auto; border-bottom: 1px solid #555; margin-bottom: 20px; text-align: right; padding: 10px; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>השחף המצווח</h1>
    <p>שאלו את ה-AI שאלות של כן/לא כדי לפתור את המסתורין...</p>

    <div id="chat-box">
        <div id="responses"></div>
        <input type="text" id="userQuestion" placeholder="שאלו שאלה של כן ולא בלבד">
        <button onclick="askAI()">שאל</button>
    </div>

    <script> 
        const MODEL_PATH = "models/gemini-2.0-flash";

            // הגדרות בטיחות כדי למנוע חסימה בגלל נושא ההתאבדות/אכילת אדם בחידה
            const safetySettings = [
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
            ];

            const url = `/api/chat`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: questionText
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    resDiv.innerHTML += `<div style="color: #ff4757;"><b>שגיאה:</b> ${data.error}</div>`;
                } else {
                    // כאן אנחנו מושכים את answer כפי שהגדרנו ב-api/chat.js
                    const answer = data.answer;
                    resDiv.innerHTML += `<div><b>AI:</b> ${answer}</div>`;
                }
            } catch (e) {
                resDiv.innerHTML += `<div style="color: #ff4757;"><b>שגיאה:</b> חיבור לשרת נכשל.</div>`;
            } 

            resDiv.scrollTop = resDiv.scrollHeight;
        }

    </script>
</body>
</html>
